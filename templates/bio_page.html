<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة البايو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .username {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .bio {
            color: #555;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        .button {
            display: block;
            background: #f0f0f0;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            font-weight: 500;
        }
        .button:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }
        .youtube { background: #ff0000; color: white; }
        .instagram { background: #e4405f; color: white; }
        .tiktok { background: #000000; color: white; }
        .facebook { background: #1877f2; color: white; }
        .custom-link { background: #667eea; color: white; }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: white;
        }
        .footer a {
            color: #ffd700;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .card { padding: 20px; }
            .name { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="profile-img">
                👤
            </div>
            <div class="name">{{ display_name }}</div>
            <div class="username">{{ username }}</div>
            {% if bio %}
            <div class="bio">{{ bio }}</div>
            {% endif %}
            
            {% for account in accounts %}
            <a href="{{ account.url }}" class="button {{ account.platform }}" target="_blank">
                {{ account.icon }} {{ account.name }}
            </a>
            {% endfor %}
            
            {% for link in custom_links %}
            <a href="{{ link.url }}" class="button custom-link" target="_blank">
                🔗 {{ link.title }}
            </a>
            {% endfor %}
        </div>
        <div class="footer">
            تم الإنشاء عبر <a href="https://t.me/Social_Media_tools_bot">@Social_Media_tools_bot</a>
        </div>
    </div>
</body>
</html>
