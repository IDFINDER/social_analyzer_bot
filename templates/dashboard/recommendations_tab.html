<div class="card">
    <h3><i class="fas fa-robot"></i> توصيات الذكاء الاصطناعي</h3>
    
    <!-- إحصائيات سريعة -->
    <div id="recStats" style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
        <div style="background: linear-gradient(135deg, #667eea20, #764ba220); border-radius: 12px; padding: 8px 12px; text-align: center; flex: 1;">
            <div id="totalRecs" style="font-size: 18px; font-weight: bold; color: #667eea;">0</div>
            <div style="font-size: 10px; color: #888;">إجمالي التوصيات</div>
        </div>
        <div style="background: linear-gradient(135deg, #48bb7820, #38a16920); border-radius: 12px; padding: 8px 12px; text-align: center; flex: 1;">
            <div id="pinnedRecs" style="font-size: 18px; font-weight: bold; color: #48bb78;">0</div>
            <div style="font-size: 10px; color: #888;">توصيات مثبتة</div>
        </div>
        <div style="background: linear-gradient(135deg, #ed893620, #dd6b2020); border-radius: 12px; padding: 8px 12px; text-align: center; flex: 1;">
            <div id="remainingRecs" style="font-size: 18px; font-weight: bold; color: #ed8936;">0</div>
            <div style="font-size: 10px; color: #888;">توصيات متاحة</div>
        </div>
    </div>
    
    <!-- شريط الترتيب وحفظ التغييرات -->
    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center;">
        <div style="flex: 2;">
            <select id="sortRecsSelect" style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 12px; background: white;">
                <option value="newest">📅 الأحدث ← الأقدم</option>
                <option value="oldest">📅 الأقدم ← الأحدث</option>
            </select>
        </div>
        <div>
            <button id="saveSettingsBtn" style="background: linear-gradient(135deg, #48bb78, #38a169); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px;">
                <i class="fas fa-save"></i> حفظ التغييرات
            </button>
        </div>
    </div>
    
    <div id="recommendationsList"></div>
</div>

<!-- مساحة فارغة أسفل الصفحة -->
<div style="height: 80px;"></div>

<script>
    // تخزين البيانات محلياً للتثبيت والترتيب
    let allRecommendations = [];
    let pinnedRecommendations = [];
    let currentSortOrder = 'newest';
    
    // تحميل الإعدادات المحفوظة من localStorage
    function loadSavedSettings() {
        const savedPinned = localStorage.getItem('pinnedRecs');
        if (savedPinned) {
            pinnedRecommendations = JSON.parse(savedPinned);
        } else {
            pinnedRecommendations = [];
        }
        
        const savedSort = localStorage.getItem('sortOrder');
        if (savedSort) {
            currentSortOrder = savedSort;
            const sortSelect = document.getElementById('sortRecsSelect');
            if (sortSelect) sortSelect.value = currentSortOrder;
        }
        
        // تحديث الإحصائيات
        updateRecStats();
    }
    
    // حفظ الإعدادات إلى localStorage
    function saveSettings() {
        localStorage.setItem('pinnedRecs', JSON.stringify(pinnedRecommendations));
        localStorage.setItem('sortOrder', currentSortOrder);
        
        const saveBtn = document.getElementById('saveSettingsBtn');
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = '<i class="fas fa-check"></i> تم الحفظ!';
        saveBtn.style.background = 'linear-gradient(135deg, #38a169, #2f855a)';
        
        setTimeout(() => {
            saveBtn.innerHTML = originalText;
            saveBtn.style.background = 'linear-gradient(135deg, #48bb78, #38a169)';
        }, 1500);
        
        displayRecommendations();
    }
    
    // تثبيت/إلغاء تثبيت توصية
    function togglePinRec(recId, event) {
        event.stopPropagation();
        
        const index = pinnedRecommendations.indexOf(recId);
        if (index === -1) {
            pinnedRecommendations.push(recId);
        } else {
            pinnedRecommendations.splice(index, 1);
        }
        
        displayRecommendations();
        updateRecStats();
    }
    
    // تحديث إحصائيات التوصيات
    function updateRecStats() {
        const total = allRecommendations.length;
        const pinned = pinnedRecommendations.length;
        
        const totalEl = document.getElementById('totalRecs');
        const pinnedEl = document.getElementById('pinnedRecs');
        const remainingEl = document.getElementById('remainingRecs');
        
        if (totalEl) totalEl.innerHTML = total;
        if (pinnedEl) pinnedEl.innerHTML = pinned;
        
        // عرض التوصيات المتاحة (الحد المتبقي)
        if (window.userData && window.userData.gemini_limit) {
            const remaining = Math.max(0, window.userData.gemini_limit - (window.userData.gemini_uses || 0));
            if (remainingEl) remainingEl.innerHTML = remaining;
        } else {
            if (remainingEl) remainingEl.innerHTML = '—';
        }
    }
    
    // عرض التوصيات مع الترتيب
    function displayRecommendations() {
        const container = document.getElementById('recommendationsList');
        if (!container) return;
        
        const sortOrder = currentSortOrder;
        
        let pinned = [];
        let unpinned = [];
        
        for (const rec of allRecommendations) {
            if (pinnedRecommendations.includes(rec.id)) {
                pinned.push(rec);
            } else {
                unpinned.push(rec);
            }
        }
        
        const sortByDate = (a, b) => {
            const dateA = new Date(a.created_at);
            const dateB = new Date(b.created_at);
            return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
        };
        
        pinned.sort(sortByDate);
        unpinned.sort(sortByDate);
        
        let filtered = [...pinned, ...unpinned];
        
        const platformColors = {
            youtube: '#ff0000',
            instagram: '#e1306c',
            tiktok: '#000000',
            facebook: '#1877f2'
        };
        
        const platformNames = {
            youtube: 'يوتيوب',
            instagram: 'انستقرام',
            tiktok: 'تيك توك',
            facebook: 'فيسبوك'
        };
        
        const platformIcons = {
            youtube: 'fab fa-youtube',
            instagram: 'fab fa-instagram',
            tiktok: 'fab fa-tiktok',
            facebook: 'fab fa-facebook-f'
        };
        
        if (!filtered.length) {
            container.innerHTML = `
                <div style="text-align:center; padding:60px 20px; color:#888;">
                    <i class="fas fa-robot" style="font-size: 48px; margin-bottom: 15px; display: block;"></i>
                    <p>لا توجد توصيات حتى الآن</p>
                    <p style="font-size: 12px; margin-top: 10px;">قم بتحليل قناتك باستخدام توصيات الذكاء الاصطناعي</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filtered.map(rec => {
            // معالجة اسم الحساب - إزالة @ المكرر
            let accountName = rec.account_identifier || 'غير محدد';
            if (accountName.startsWith('@@')) {
                accountName = accountName.substring(1);
            }
            if (accountName.startsWith('@')) {
                // نترك @ واحدة فقط
            }
            
            let fullText = rec.recommendation_text || rec.recommendation_summary || '';
            
            // إزالة الأسطر غير المرغوب فيها
            fullText = fullText.replace(/📊 \*\*المتبقي اليوم:.*?\*\*/g, '');
            fullText = fullText.replace(/💎 \*\*مستوى التوصية:.*?\*\*/g, '');
            fullText = fullText.replace(/━━━━━━━━━━━━━━━━━━━━━━/g, '');
            fullText = fullText.replace(/\n\s*\n\s*\n/g, '\n\n');
            
            // اختصار النص في البطاقة (أول 200 حرف)
            let shortText = fullText.substring(0, 200);
            if (fullText.length > 200) shortText += '...';
            
            let formattedText = shortText
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            
            const isPinned = pinnedRecommendations.includes(rec.id);
            const recDate = new Date(rec.created_at);
            const formattedDate = recDate.toLocaleDateString('ar-EG');
            
            return `
                <div class="recommendation-card" data-recid="${rec.id}">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;">
                        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                            <span class="recommendation-platform" style="background: ${platformColors[rec.platform] || '#667eea'}; color: white;">
                                <i class="${platformIcons[rec.platform] || 'fas fa-robot'}"></i>
                                ${platformNames[rec.platform] || rec.platform}
                            </span>
                            <span style="font-size: 11px; color: #888;">
                                <i class="fas fa-calendar"></i> ${formattedDate}
                            </span>
                            ${isPinned ? '<span style="background: #f6d365; color: #333; padding: 2px 8px; border-radius: 12px; font-size: 10px;"><i class="fas fa-thumbtack"></i> مثبتة</span>' : ''}
                        </div>
                        <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePinRec(${rec.id}, event)">
                            <i class="fas fa-thumbtack" style="transform: ${isPinned ? 'rotate(45deg)' : 'none'}"></i>
                            ${isPinned ? 'إلغاء التثبيت' : 'تثبيت'}
                        </button>
                    </div>
                    <div style="margin-bottom: 8px;">
                        <strong><i class="fas fa-at"></i> الحساب:</strong> ${accountName.startsWith('@') ? accountName : '@' + accountName}
                    </div>
                    <div class="recommendation-text-full" style="font-size: 13px; line-height: 1.6; color: #2d3748; background: #f8f9fa; border-radius: 12px; padding: 12px; margin: 10px 0; max-height: 150px; overflow-y: auto;">
                        ${formattedText}
                    </div>
                    <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
                        <button class="btn-view" onclick="showFullRecommendation(${JSON.stringify(fullText).replace(/"/g, '&quot;')})">
                            <i class="fas fa-expand"></i> عرض التوصية كاملة
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // إعداد مستمعي الأحداث
    function setupEventListeners() {
        const sortSelect = document.getElementById('sortRecsSelect');
        const saveBtn = document.getElementById('saveSettingsBtn');
        
        if (sortSelect) {
            sortSelect.addEventListener('change', (e) => {
                currentSortOrder = e.target.value;
                displayRecommendations();
            });
        }
        
        if (saveBtn) {
            saveBtn.addEventListener('click', () => {
                saveSettings();
            });
        }
    }
    
    // تحديث التوصيات الرئيسية
    function updateRecommendationsTab(data) {
        window.userData = data;
        allRecommendations = data.recommendations || [];
        
        // إضافة id فريد
        allRecommendations = allRecommendations.map((rec, index) => {
            if (!rec.id) rec.id = index + 1;
            return rec;
        });
        
        loadSavedSettings();
        setupEventListeners();
        updateRecStats();
        displayRecommendations();
    }
</script>

<style>
    .recommendation-card {
        background: linear-gradient(135deg, #667eea08, #764ba208);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 16px;
        border-right: 4px solid var(--primary);
        transition: all 0.3s ease;
    }
    
    .recommendation-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    
    .recommendation-platform {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: bold;
    }
    
    .pin-btn {
        background: transparent;
        border: 1px solid #e2e8f0;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #888;
    }
    
    .pin-btn:hover {
        background: #f6d36520;
        border-color: #f6d365;
        color: #f6d365;
    }
    
    .pin-btn.pinned {
        background: #f6d36520;
        border-color: #f6d365;
        color: #f6d365;
    }
    
    .recommendation-text-full {
        scrollbar-width: thin;
    }
    
    .recommendation-text-full::-webkit-scrollbar {
        width: 6px;
    }
    
    .recommendation-text-full::-webkit-scrollbar-track {
        background: #e2e8f0;
        border-radius: 10px;
    }
    
    .recommendation-text-full::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 10px;
    }
    
    .btn-view {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    .btn-view:hover {
        transform: scale(1.02);
        opacity: 0.9;
    }
    
    #sortRecsSelect:focus {
        outline: none;
        border-color: var(--primary);
    }
    
    #saveSettingsBtn:hover {
        transform: scale(1.02);
    }
</style>
