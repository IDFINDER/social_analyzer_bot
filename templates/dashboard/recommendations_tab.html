<div class="card">
    <h3><i class="fas fa-robot"></i> آخر توصيات الذكاء الاصطناعي</h3>
    <div id="recommendationsList"></div>
</div>

<!-- مساحة فارغة أسفل الصفحة -->
<div style="height: 80px;"></div>

<script>
    function updateRecommendationsTab(data) {
        const container = document.getElementById('recommendationsList');
        const recommendations = data.recommendations || [];
        
        const platformColors = {
            youtube: '#ff0000',
            instagram: '#e1306c',
            tiktok: '#000000',
            facebook: '#1877f2'
        };
        
        const platformNames = {
            youtube: 'يوتيوب',
            instagram: 'انستقرام',
            tiktok: 'تيك توك',
            facebook: 'فيسبوك'
        };
        
        const platformIcons = {
            youtube: 'fab fa-youtube',
            instagram: 'fab fa-instagram',
            tiktok: 'fab fa-tiktok',
            facebook: 'fab fa-facebook-f'
        };
        
        if (!recommendations.length) {
            container.innerHTML = `
                <div style="text-align:center; padding:60px 20px; color:#888;">
                    <i class="fas fa-robot" style="font-size: 48px; margin-bottom: 15px; display: block;"></i>
                    <p>لا توجد توصيات حتى الآن</p>
                    <p style="font-size: 12px; margin-top: 10px;">قم بتحليل قناتك واستخدم توصيات الذكاء الاصطناعي</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = recommendations.map(rec => {
            // تنظيف النص من الأسطر الغير مرغوب فيها
            let fullText = rec.recommendation_text || rec.recommendation_summary || '';
            
            // إزالة الأسطر التي تحتوي على "المتبقي اليوم" و "مستوى التوصية"
            fullText = fullText.replace(/📊 \*\*المتبقي اليوم:.*?\*\*/g, '');
            fullText = fullText.replace(/💎 \*\*مستوى التوصية:.*?\*\*/g, '');
            fullText = fullText.replace(/━━━━━━━━━━━━━━━━━━━━━━/g, '');
            
            // تنظيف الأسطر الفارغة المتكررة
            fullText = fullText.replace(/\n\s*\n\s*\n/g, '\n\n');
            
            // تحويل النص إلى HTML مع الاحتفاظ بالتنسيق
            let formattedText = fullText
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')  // **نص** → <strong>نص</strong>
                .replace(/\n/g, '<br>')                           // الأسطر الجديدة
                .replace(/^\s+|\s+$/g, '');                        // إزالة المسافات الزائدة
            
            return `
                <div class="recommendation-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;">
                        <span class="recommendation-platform" style="background: ${platformColors[rec.platform] || '#667eea'}; color: white;">
                            <i class="${platformIcons[rec.platform] || 'fas fa-robot'}"></i>
                            ${platformNames[rec.platform] || rec.platform}
                        </span>
                        <span style="font-size: 11px; color: #888;">
                            <i class="fas fa-calendar"></i> ${new Date(rec.created_at).toLocaleDateString('ar-EG')}
                        </span>
                    </div>
                    <div style="margin-bottom: 8px;">
                        <strong><i class="fas fa-at"></i> الحساب:</strong> @${rec.account_identifier || 'غير محدد'}
                    </div>
                    <div class="recommendation-text-full" style="font-size: 13px; line-height: 1.6; color: #2d3748; background: #f8f9fa; border-radius: 12px; padding: 12px; margin: 10px 0; max-height: 300px; overflow-y: auto;">
                        ${formattedText}
                    </div>
                    <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
                        <button class="btn-view" onclick="showFullRecommendation(${JSON.stringify(fullText).replace(/"/g, '&quot;')})">
                            <i class="fas fa-expand"></i> عرض التفاصيل الكاملة
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }
</script>

<style>
    /* تنسيق محسن لبطاقات التوصيات */
    .recommendation-card {
        background: linear-gradient(135deg, #667eea08, #764ba208);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 16px;
        border-right: 4px solid var(--primary);
        transition: all 0.3s ease;
    }
    
    .recommendation-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    
    .recommendation-platform {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: bold;
    }
    
    .recommendation-text-full {
        scrollbar-width: thin;
        scrollbar-color: var(--primary) #e2e8f0;
    }
    
    .recommendation-text-full::-webkit-scrollbar {
        width: 6px;
    }
    
    .recommendation-text-full::-webkit-scrollbar-track {
        background: #e2e8f0;
        border-radius: 10px;
    }
    
    .recommendation-text-full::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 10px;
    }
    
    .btn-view {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    .btn-view:hover {
        transform: scale(1.02);
        opacity: 0.9;
    }
</style>
