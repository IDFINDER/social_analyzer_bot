<div class="card">
    <h3><i class="fas fa-user-circle"></i> ملفي الشخصي</h3>
    
    <!-- المعلومات الأساسية (بدون صورة) -->
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
        <div style="flex: 1;">
            <div style="display: flex; justify-content: space-between; padding: 5px 0;">
                <span>👤 الاسم:</span>
                <span id="userName" style="font-weight: bold;">-</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 5px 0;">
                <span>📱 المعرف:</span>
                <span id="userHandle" style="font-weight: bold;">-</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 5px 0;">
                <span>💎 الحالة:</span>
                <span id="userStatus">-</span>
            </div>
        </div>
    </div>
    
    <!-- إحصائيات سريعة -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; padding: 10px; background: #f8f9fa; border-radius: 16px;">
        <div style="text-align: center;">
            <div id="totalAnalyses" style="font-size: 18px; font-weight: bold; color: #667eea;">0</div>
            <div style="font-size: 10px; color: #888;">📊 تحليلات</div>
        </div>
        <div style="text-align: center;">
            <div id="totalRecommendations" style="font-size: 18px; font-weight: bold; color: #48bb78;">0</div>
            <div style="font-size: 10px; color: #888;">🤖 توصيات</div>
        </div>
        <div style="text-align: center;">
            <div id="lastActive" style="font-size: 12px; font-weight: bold; color: #ed8936;">-</div>
            <div style="font-size: 10px; color: #888;">🕒 آخر نشاط</div>
        </div>
    </div>
    
    <!-- شريط نسبة إكمال الملف -->
    <div style="margin: 15px 0;">
        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
            <span><i class="fas fa-chart-line"></i> نسبة اكمال ملفك الشخصي</span>
            <span id="completionPercent">0%</span>
        </div>
        <div style="background: #e2e8f0; border-radius: 20px; height: 8px; overflow: hidden;">
            <div id="completionBar" style="width: 0%; height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; transition: width 0.5s;"></div>
        </div>
        <div id="completionMessage" style="font-size: 10px; color: #888; margin-top: 5px;"></div>
    </div>
    
    <!-- تنبيهات الحسابات -->
    <div id="accountAlerts" style="margin: 15px 0;"></div>
    
    <!-- تاريخ الانضمام واللغة -->
    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid #eee; margin-top: 10px;">
        <span>📅 تاريخ الانضمام:</span>
        <span id="joinDate" style="font-weight: bold;">-</span>
    </div>
    <div style="display: flex; justify-content: space-between; padding: 8px 0;">
        <span>🌐 اللغة المفضلة:</span>
        <span id="userLanguage" style="font-weight: bold;">-</span>
    </div>
</div>

<!-- رابط صفحة البايو (بدون QR Code) -->
<div id="bioLinkCard" class="card" style="display: none;">
    <h3><i class="fas fa-link"></i> صفحتي الشخصية</h3>
    <div style="background: linear-gradient(135deg, #667eea10, #764ba210); border-radius: 16px; padding: 15px; text-align: center;">
        <div style="font-size: 13px; margin-bottom: 8px;">
            👁️ <span id="bioViews">0</span> مشاهدة
        </div>
        <a id="bioLink" href="#" target="_blank" style="display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-size: 14px;">
            <i class="fas fa-id-card"></i> صفحتي الشخصية
        </a>
        <p style="font-size: 10px; color: #888; margin-top: 8px;">اضغط للنسخ والمشاركة</p>
    </div>
</div>

<!-- إنجازات المستخدم -->
<div class="card">
    <h3><i class="fas fa-trophy"></i> إنجازاتي 🏆</h3>
    <div id="achievementsList" style="display: flex; flex-wrap: wrap; gap: 10px;">
        <!-- سيتم تعبئتها بواسطة JavaScript -->
    </div>
</div>

<div class="card">
    <h3><i class="fas fa-link"></i> حساباتي المسجلة</h3>
    <div id="accountsList"></div>
</div>

<!-- مسافة فارغة أسفل الصفحة لظهور جميع المحتوى -->
<div style="height: 80px;"></div>

<script>
    // ========== معلومات المنصات (مع إضافة سناب شات) ==========
    const platformInfo = {
        youtube: { name: 'يوتيوب', icon: 'fab fa-youtube', color: '#ff0000', baseUrl: 'https://youtube.com/@' },
        instagram: { name: 'انستقرام', icon: 'fab fa-instagram', color: '#e1306c', baseUrl: 'https://instagram.com/' },
        tiktok: { name: 'تيك توك', icon: 'fab fa-tiktok', color: '#000000', baseUrl: 'https://tiktok.com/@' },
        facebook: { name: 'فيسبوك', icon: 'fab fa-facebook-f', color: '#1877f2', baseUrl: 'https://facebook.com/' },
        snapchat: { name: 'سناب شات', icon: 'fab fa-snapchat', color: '#fffc00', baseUrl: 'https://snapchat.com/add/' }
    };
    
    // ترتيب عرض المنصات (مع إضافة snapchat)
    const platformOrder = ['youtube', 'instagram', 'tiktok', 'facebook', 'snapchat'];
    
    // أيقونات الإنجازات
    const achievementsConfig = {
        first_analysis: { icon: '🎯', name: 'أول تحليل', desc: 'أجرى أول تحليل لحساب', color: '#667eea' },
        ten_analyses: { icon: '📊', name: '10 تحليلات', desc: 'أجرى 10 تحليلات', color: '#48bb78' },
        fifty_analyses: { icon: '🔥', name: '50 تحليلاً', desc: 'أجرى 50 تحليلاً', color: '#ed8936' },
        premium: { icon: '👑', name: 'مشترك مميز', desc: 'اشترك في الخطة المميزة', color: '#e94560' },
        first_recommendation: { icon: '🤖', name: 'أول توصية', desc: 'حصل على أول توصية AI', color: '#9b59b6' },
        complete_profile: { icon: '✅', name: 'ملف كامل', desc: 'أكمل جميع حسابات التواصل', color: '#38a169' },
        bio_page: { icon: '📄', name: 'صفحة بايو', desc: 'فعّل صفحة البايو الشخصية', color: '#f6d365' }
    };
    
    function updateProfileTab(data) {
        // ========== المعلومات الأساسية ==========
        document.getElementById('userName').innerText = data.user.first_name || '-';
        document.getElementById('userHandle').innerText = data.user.username ? `@${data.user.username}` : '-';
        
        // الحالة
        const statusSpan = document.getElementById('userStatus');
        if (data.is_premium) {
            statusSpan.innerHTML = '<span class="success-badge">👑 مميز</span>';
        } else {
            statusSpan.innerHTML = '<span class="warning-badge">🎁 مجاني</span>';
        }
        
        // ========== إحصائيات سريعة ==========
        const totalUses = data.stats?.total_uses || 0;
        const totalGeminiUses = data.gemini_uses || 0;
        document.getElementById('totalAnalyses').innerHTML = totalUses;
        document.getElementById('totalRecommendations').innerHTML = totalGeminiUses;
        
        // آخر نشاط
        if (data.user.last_activity) {
            const lastActive = new Date(data.user.last_activity);
            const now = new Date();
            const diffDays = Math.floor((now - lastActive) / (1000 * 60 * 60 * 24));
            if (diffDays === 0) {
                document.getElementById('lastActive').innerHTML = 'اليوم';
            } else if (diffDays === 1) {
                document.getElementById('lastActive').innerHTML = 'أمس';
            } else {
                document.getElementById('lastActive').innerHTML = `منذ ${diffDays} يوم`;
            }
        } else {
            document.getElementById('lastActive').innerHTML = 'غير محدد';
        }
        
        // ========== نسبة إكمال الملف ==========
        const accounts = data.accounts || {};
        let completedAccounts = 0;
        let totalAccounts = platformOrder.length;
        
        for (const platform of platformOrder) {
            if (accounts[platform] && accounts[platform].account_identifier) {
                completedAccounts++;
            }
        }
        
        // عوامل إضافية للإكمال
        let extraPoints = 0;
        if (data.user.first_name) extraPoints += 10;
        if (data.user.username) extraPoints += 10;
        if (data.is_premium) extraPoints += 20;
        if (data.bio_page) extraPoints += 20;
        
        const completionPercent = Math.min(100, Math.floor((completedAccounts / totalAccounts) * 60 + extraPoints));
        document.getElementById('completionPercent').innerHTML = `${completionPercent}%`;
        document.getElementById('completionBar').style.width = `${completionPercent}%`;
        
        let completionMessage = '';
        if (completionPercent === 100) {
            completionMessage = '🎉 مذهل! ملفك مكتمل بالكامل';
        } else if (completionPercent >= 70) {
            completionMessage = '👍 ممتاز! قريب من الاكتمال';
        } else if (completionPercent >= 40) {
            completionMessage = '📝 يمكنك إضافة المزيد من الحسابات';
        } else {
            completionMessage = '✨ أضف حساباتك للحصول على تجربة أفضل';
        }
        document.getElementById('completionMessage').innerHTML = completionMessage;
        
        // ========== تنبيهات الحسابات ==========
        const accountAlerts = document.getElementById('accountAlerts');
        let alertsHtml = '';
        
        for (const platform of platformOrder) {
            const acc = accounts[platform];
            if (!acc || !acc.account_identifier) {
                alertsHtml += `
                    <div style="background: #fff3cd; border-right: 3px solid #ffc107; padding: 8px; margin-bottom: 8px; border-radius: 10px; font-size: 12px;">
                        <i class="fas fa-exclamation-triangle" style="color: #ffc107;"></i>
                        <strong>${platformInfo[platform].name}</strong>: لم تقم بتسجيل حساب بعد
                    </div>
                `;
            }
        }
        
        if (alertsHtml) {
            accountAlerts.innerHTML = `<div style="margin-bottom: 8px;"><i class="fas fa-bell"></i> تنبيهات</div>${alertsHtml}`;
        } else {
            accountAlerts.innerHTML = '<div style="background: #d4edda; border-right: 3px solid #28a745; padding: 8px; border-radius: 10px; font-size: 12px;"><i class="fas fa-check-circle" style="color: #28a745;"></i> جميع حساباتك مسجلة! ✅</div>';
        }
        
        // ========== تاريخ الانضمام واللغة ==========
        if (data.user.created_at) {
            const joinDate = new Date(data.user.created_at).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('joinDate').innerHTML = joinDate;
        } else {
            document.getElementById('joinDate').innerText = 'غير محدد';
        }
        
        const langNames = {
            'ar': 'العربية 🇸🇦',
            'en': 'English 🇬🇧',
            'fr': 'Français 🇫🇷',
            'de': 'Deutsch 🇩🇪'
        };
        const userLang = data.user.language_code || 'ar';
        document.getElementById('userLanguage').innerHTML = langNames[userLang] || userLang;
        
        // ========== الحسابات المسجلة (مع إضافة سناب شات) ==========
        const accountsList = document.getElementById('accountsList');
        let accountsHtml = '';
        let hasAnyAccount = false;
        
        for (const platform of platformOrder) {
            const acc = accounts[platform];
            const info = platformInfo[platform];
            const hasAccount = acc && acc.account_identifier;
            
            if (hasAccount) {
                hasAnyAccount = true;
                let username = acc.account_identifier;
                if (username.startsWith('@')) {
                    username = username.substring(1);
                }
                const profileUrl = `${info.baseUrl}${username}`;
                
                accountsHtml += `
                    <div class="account-item">
                        <div class="account-icon" style="background: ${info.color};">
                            <i class="${info.icon}" style="color: white;"></i>
                        </div>
                        <div style="flex:1;"><strong>${info.name}</strong></div>
                        <a href="${profileUrl}" target="_blank" rel="noopener noreferrer" 
                           style="color: ${info.color}; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                            <span>@${username}</span>
                            <i class="fas fa-external-link-alt" style="font-size: 10px;"></i>
                        </a>
                    </div>
                `;
            } else {
                accountsHtml += `
                    <div class="account-item" style="opacity: 0.6;">
                        <div class="account-icon" style="background: #ccc;">
                            <i class="${info.icon}" style="color: white;"></i>
                        </div>
                        <div style="flex:1;"><strong>${info.name}</strong></div>
                        <div style="color: #999; font-size: 12px;">
                            <i class="fas fa-plus-circle"></i> لم تسجل بعد
                        </div>
                    </div>
                `;
            }
        }
        
        if (!hasAnyAccount) {
            accountsHtml = '<div style="text-align:center; padding:20px; color:#888;"><i class="fas fa-info-circle"></i> لا توجد حسابات مسجلة<br><small>استخدم أمر /edit لإضافة حساباتك</small></div>';
        }
        accountsList.innerHTML = accountsHtml;
        
        // ========== رابط صفحة البايو ==========
        const bioCard = document.getElementById('bioLinkCard');
        
        if (data.is_premium && data.bio_page) {
            bioCard.style.display = 'block';
            const bioUrl = data.bio_page.page_url || data.bio_page.url;
            const fullUrl = `https://social-analyzer-flask.onrender.com/bio/${bioUrl}`;
            const bioLink = document.getElementById('bioLink');
            bioLink.href = fullUrl;
            
            // نسخ الرابط
            bioLink.onclick = function(e) {
                e.preventDefault();
                navigator.clipboard.writeText(fullUrl);
                const originalText = bioLink.innerHTML;
                bioLink.innerHTML = '<i class="fas fa-check"></i> تم النسخ!';
                setTimeout(() => {
                    bioLink.innerHTML = originalText;
                }, 2000);
            };
            
            // عدد المشاهدات
            const viewsCount = data.bio_page.views_count || 0;
            document.getElementById('bioViews').innerHTML = viewsCount;
        } else {
            bioCard.style.display = 'none';
        }
        
        // ========== إنجازات المستخدم ==========
        const achievementsList = document.getElementById('achievementsList');
        let achievements = [];
        
        if (totalUses >= 1) achievements.push('first_analysis');
        if (totalUses >= 10) achievements.push('ten_analyses');
        if (totalUses >= 50) achievements.push('fifty_analyses');
        if (data.is_premium) achievements.push('premium');
        if (totalGeminiUses >= 1) achievements.push('first_recommendation');
        if (completedAccounts === totalAccounts) achievements.push('complete_profile');
        if (data.bio_page) achievements.push('bio_page');
        
        if (achievements.length > 0) {
            achievementsList.innerHTML = achievements.map(ach => `
                <div style="background: linear-gradient(135deg, ${achievementsConfig[ach].color}20, ${achievementsConfig[ach].color}10); border-radius: 12px; padding: 8px 12px; text-align: center; min-width: 80px; border: 1px solid ${achievementsConfig[ach].color}30;">
                    <div style="font-size: 24px;">${achievementsConfig[ach].icon}</div>
                    <div style="font-size: 11px; font-weight: bold; color: ${achievementsConfig[ach].color};">${achievementsConfig[ach].name}</div>
                    <div style="font-size: 9px; color: #888;">${achievementsConfig[ach].desc}</div>
                </div>
            `).join('');
        } else {
            achievementsList.innerHTML = '<div style="text-align:center; padding:20px; color:#888;"><i class="fas fa-medal"></i> لا توجد إنجازات بعد<br><small>ابدأ باستخدام البوت للحصول على إنجازاتك الأولى!</small></div>';
        }
    }
</script>

<style>
    .account-item a {
        transition: all 0.2s ease;
    }
    .account-item a:hover {
        opacity: 0.8;
        text-decoration: underline !important;
    }
</style>
