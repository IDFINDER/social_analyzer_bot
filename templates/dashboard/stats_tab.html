<div class="card">
    <h3><i class="fas fa-chart-line"></i> إحصائيات التحليلات</h3>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chart-container">
        <canvas id="platformChart"></canvas>
    </div>
</div>

<div class="card">
    <h3><i class="fas fa-chart-bar"></i> تطور التحليلات</h3>
    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>
    <p style="font-size: 11px; color: #888; text-align: center; margin-top: 10px;">📅 آخر 7 أيام</p>
</div>

<!-- مساحة فارغة أسفل الصفحة -->
<div style="height: 80px;"></div>

<script>
    function updateStatsTab(data) {
        const stats = data.stats || {};
        const total = stats.total_uses || 0;
        
        // إضافة إحصائيات إضافية
        const totalGeminiUses = data.gemini_uses || 0;
        const geminiLimit = data.gemini_limit || 0;
        
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card">
                <div class="stat-number">${total}</div>
                <div class="stat-label">📊 إجمالي التحليلات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.youtube_uses || 0}</div>
                <div class="stat-label">🎬 يوتيوب</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.instagram_uses || 0}</div>
                <div class="stat-label">📸 انستقرام</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.tiktok_uses || 0}</div>
                <div class="stat-label">🎵 تيك توك</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.facebook_uses || 0}</div>
                <div class="stat-label">📘 فيسبوك</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${totalGeminiUses}</div>
                <div class="stat-label">🤖 توصيات AI</div>
            </div>
        `;
        
        // ========== الرسم البياني للمنصات ==========
        const ctx = document.getElementById('platformChart');
        if (ctx) {
            const existingChart = Chart.getChart(ctx);
            if (existingChart) {
                existingChart.destroy();
            }
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['🎬 يوتيوب', '📸 انستقرام', '🎵 تيك توك', '📘 فيسبوك'],
                    datasets: [{
                        label: 'عدد التحليلات',
                        data: [stats.youtube_uses || 0, stats.instagram_uses || 0, stats.tiktok_uses || 0, stats.facebook_uses || 0],
                        backgroundColor: ['#ff0000', '#e1306c', '#000000', '#1877f2'],
                        borderRadius: 8,
                        barPercentage: 0.7,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { font: { size: 10 } }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.raw} تحليل`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'عدد التحليلات',
                                font: { size: 10 }
                            },
                            ticks: { font: { size: 9 } }
                        },
                        x: {
                            ticks: { font: { size: 9 } }
                        }
                    }
                }
            });
        }
        
        // ========== الرسم البياني للتطور ==========
        const trendCtx = document.getElementById('trendChart');
        if (trendCtx) {
            const existingTrendChart = Chart.getChart(trendCtx);
            if (existingTrendChart) {
                existingTrendChart.destroy();
            }
            
            // بيانات حقيقية لتطور التحليلات (يمكن أن تكون من API لاحقاً)
            const dailyData = [
                stats.day1_uses || 0,
                stats.day2_uses || 0,
                stats.day3_uses || 0,
                stats.day4_uses || 0,
                stats.day5_uses || 0,
                stats.day6_uses || 0,
                total
            ];
            
            new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: ['يوم 1', 'يوم 2', 'يوم 3', 'يوم 4', 'يوم 5', 'يوم 6', 'اليوم'],
                    datasets: [{
                        label: 'عدد التحليلات',
                        data: dailyData,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102,126,234,0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { font: { size: 10 } }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.raw} تحليل`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'عدد التحليلات',
                                font: { size: 10 }
                            },
                            ticks: { font: { size: 9 } }
                        },
                        x: {
                            ticks: { font: { size: 9 } }
                        }
                    }
                }
            });
        }
    }
</script>

<style>
    /* تحسينات إضافية للتبويب */
    .stats-grid .stat-card {
        transition: all 0.3s ease;
        cursor: default;
    }
    
    .stats-grid .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    
    .chart-container canvas {
        max-height: 220px;
        width: 100%;
    }
</style>
