<div class="card">
    <h3><i class="fas fa-chart-line"></i> إحصائيات التحليلات</h3>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chart-container">
        <canvas id="platformChart"></canvas>
    </div>
</div>

<div class="card">
    <h3><i class="fas fa-chart-bar"></i> تطور التحليلات</h3>
    <div class="chart-container">
        <canvas id="trendChart"></canvas>
    </div>
    <p style="font-size: 11px; color: var(--text-light, #888); text-align: center; margin-top: 10px;">📅 آخر 7 أيام</p>
</div>

<!-- ========== بطاقة نقطة البداية (أول تحليل مرجعي) ========== -->
<div id="firstAnalysisCard" class="card" style="display: none;">
    <h3><i class="fas fa-flag-checkered"></i> 🎯 نقطة البداية (أول تحليل)</h3>
    <div id="firstAnalysisContent"></div>
    <p style="font-size: 11px; color: var(--text-light, #888); margin-top: 10px;">
        📌 هذا هو تحليلك الأول والذي يستخدم كنقطة مرجعية لقياس نمو قناتك
    </p>
</div>

<!-- مساحة فارغة أسفل الصفحة -->
<div style="height: 80px;"></div>

<script>
    // متغيرات للرسوم البيانية لتحديثها عند تغيير الوضع
    let platformChartInstance = null;
    let trendChartInstance = null;
    
    function updateStatsTab(data) {
        const stats = data.stats || {};
        const total = stats.total_uses || 0;
        
        // إضافة إحصائيات إضافية
        const totalGeminiUses = data.gemini_uses || 0;
        const geminiLimit = data.gemini_limit || 0;
        
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card">
                <div class="stat-number">${total}</div>
                <div class="stat-label">📊 إجمالي التحليلات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.youtube_uses || 0}</div>
                <div class="stat-label">🎬 يوتيوب</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.instagram_uses || 0}</div>
                <div class="stat-label">📸 انستقرام</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.tiktok_uses || 0}</div>
                <div class="stat-label">🎵 تيك توك</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.facebook_uses || 0}</div>
                <div class="stat-label">📘 فيسبوك</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${stats.snapchat_uses || 0}</div>
                <div class="stat-label">👻 سناب شات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${totalGeminiUses}</div>
                <div class="stat-label">🤖 توصيات AI</div>
            </div>
        `;
        
        // ========== الرسم البياني للمنصات (مع إضافة سناب شات) ==========
        const ctx = document.getElementById('platformChart');
        if (ctx) {
            // تدمير الرسم البياني السابق إذا وجد
            if (platformChartInstance) {
                platformChartInstance.destroy();
            }
            
            platformChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['🎬 يوتيوب', '📸 انستقرام', '🎵 تيك توك', '📘 فيسبوك', '👻 سناب شات'],
                    datasets: [{
                        label: 'عدد التحليلات',
                        data: [
                            stats.youtube_uses || 0, 
                            stats.instagram_uses || 0, 
                            stats.tiktok_uses || 0, 
                            stats.facebook_uses || 0,
                            stats.snapchat_uses || 0
                        ],
                        backgroundColor: ['#ff0000', '#e1306c', '#000000', '#1877f2', '#fffc00'],
                        borderColor: ['#ff0000', '#e1306c', '#333333', '#1877f2', '#ffdd00'],
                        borderWidth: 1,
                        borderRadius: 8,
                        barPercentage: 0.7,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { 
                                font: { size: 10 },
                                color: getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.raw} تحليل`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'عدد التحليلات',
                                font: { size: 10 },
                                color: getComputedStyle(document.body).getPropertyValue('--text-light') || '#718096'
                            },
                            ticks: { 
                                font: { size: 9 },
                                color: getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748'
                            },
                            grid: {
                                color: getComputedStyle(document.body).getPropertyValue('--border') || '#e2e8f0'
                            }
                        },
                        x: {
                            ticks: { 
                                font: { size: 9 },
                                color: getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748'
                            },
                            grid: {
                                color: getComputedStyle(document.body).getPropertyValue('--border') || '#e2e8f0'
                            }
                        }
                    }
                }
            });
        }
        
        // ========== الرسم البياني للتطور ==========
        const trendCtx = document.getElementById('trendChart');
        if (trendCtx) {
            // تدمير الرسم البياني السابق إذا وجد
            if (trendChartInstance) {
                trendChartInstance.destroy();
            }
            
            // بيانات تطور التحليلات
            const dailyData = [
                stats.day1_uses || 0,
                stats.day2_uses || 0,
                stats.day3_uses || 0,
                stats.day4_uses || 0,
                stats.day5_uses || 0,
                stats.day6_uses || 0,
                total
            ];
            
            trendChartInstance = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: ['يوم 1', 'يوم 2', 'يوم 3', 'يوم 4', 'يوم 5', 'يوم 6', 'اليوم'],
                    datasets: [{
                        label: 'عدد التحليلات',
                        data: dailyData,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102,126,234,0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { 
                                font: { size: 10 },
                                color: getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.raw} تحليل`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'عدد التحليلات',
                                font: { size: 10 },
                                color: getComputedStyle(document.body).getPropertyValue('--text-light') || '#718096'
                            },
                            ticks: { 
                                font: { size: 9 },
                                color: getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748'
                            },
                            grid: {
                                color: getComputedStyle(document.body).getPropertyValue('--border') || '#e2e8f0'
                            }
                        },
                        x: {
                            ticks: { 
                                font: { size: 9 },
                                color: getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748'
                            },
                            grid: {
                                color: getComputedStyle(document.body).getPropertyValue('--border') || '#e2e8f0'
                            }
                        }
                    }
                }
            });
        }
    }
    
        // ========== جلب أول تحليل (نقطة البداية) ==========
    async function loadFirstAnalysis() {
        const card = document.getElementById('firstAnalysisCard');
        const container = document.getElementById('firstAnalysisContent');
        
        if (!card || !container) return;
        
        try {
            const token = new URLSearchParams(window.location.search).get('token');
            if (!token) {
                card.style.display = 'none';
                return;
            }
            
            const response = await fetch(`/api/analysis/first-analysis?token=${encodeURIComponent(token)}`);
            const result = await response.json();
            
            if (!result.success || !result.data) {
                card.style.display = 'none';
                return;
            }
            
            const analysis = result.data;
            card.style.display = 'block';
            
            const analysisDate = new Date(analysis.analysis_date).toLocaleDateString('ar-EG', { year: 'numeric', month: 'numeric', day: 'numeric' });
            
            // ✅ بناء HTML مع عرض جميع البيانات
            let statsHtml = `
                <div class="analysis-stats" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;">
                    <span class="stat-mini">👥 ${formatNumber(analysis.subscribers)} مشترك</span>
                    <span class="stat-mini">👁️ ${formatNumber(analysis.total_views)} مشاهدة</span>
                    <span class="stat-mini">📹 ${analysis.total_posts || 0} فيديو</span>
                    <span class="stat-mini">📈 ${formatNumber(analysis.avg_views_per_post)} متوسط</span>
            `;
            
            // ✅ إضافة engagement_rate إذا كان موجوداً
            if (analysis.engagement_rate) {
                statsHtml += `<span class="stat-mini">❤️ نسبة التفاعل: ${analysis.engagement_rate}%</span>`;
            }
            
            // ✅ إضافة best_posting_hour إذا كان موجوداً
            if (analysis.best_posting_hour) {
                statsHtml += `<span class="stat-mini">⏰ أفضل وقت: ${analysis.best_posting_hour}:00</span>`;
            }
            
            // ✅ إضافة avg_posts_per_week إذا كان موجوداً
            if (analysis.avg_posts_per_week) {
                statsHtml += `<span class="stat-mini">📅 منشورات/أسبوع: ${analysis.avg_posts_per_week}</span>`;
            }
            
            statsHtml += `</div>`;
            
            container.innerHTML = `
                <div style="background: linear-gradient(135deg, #667eea10, #764ba210); border-radius: 16px; padding: 15px;">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;">
                        <div><strong>📺 القناة:</strong> ${analysis.account_name || '-'}</div>
                        <div><strong>📅 التاريخ:</strong> ${analysisDate}</div>
                        ${analysis.analysis_number ? `<div><strong>🔢 رقم التحليل:</strong> #${analysis.analysis_number}</div>` : ''}
                    </div>
                    ${statsHtml}
                </div>
            `;
            
        } catch (error) {
            console.error('Error loading first analysis:', error);
            card.style.display = 'none';
        }
    }
    
    function formatNumber(num) {
        if (!num && num !== 0) return '0';
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }
    
    // ========== دالة تحديث ألوان الرسوم البيانية عند تغيير الوضع ==========
    function updateChartsTheme() {
        if (platformChartInstance) {
            const textColor = getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748';
            const textLightColor = getComputedStyle(document.body).getPropertyValue('--text-light') || '#718096';
            const borderColor = getComputedStyle(document.body).getPropertyValue('--border') || '#e2e8f0';
            
            platformChartInstance.options.plugins.legend.labels.color = textColor;
            platformChartInstance.options.scales.y.ticks.color = textColor;
            platformChartInstance.options.scales.x.ticks.color = textColor;
            platformChartInstance.options.scales.y.title.color = textLightColor;
            platformChartInstance.options.scales.y.grid.color = borderColor;
            platformChartInstance.options.scales.x.grid.color = borderColor;
            platformChartInstance.update();
        }
        
        if (trendChartInstance) {
            const textColor = getComputedStyle(document.body).getPropertyValue('--text') || '#2d3748';
            const textLightColor = getComputedStyle(document.body).getPropertyValue('--text-light') || '#718096';
            const borderColor = getComputedStyle(document.body).getPropertyValue('--border') || '#e2e8f0';
            
            trendChartInstance.options.plugins.legend.labels.color = textColor;
            trendChartInstance.options.scales.y.ticks.color = textColor;
            trendChartInstance.options.scales.x.ticks.color = textColor;
            trendChartInstance.options.scales.y.title.color = textLightColor;
            trendChartInstance.options.scales.y.grid.color = borderColor;
            trendChartInstance.options.scales.x.grid.color = borderColor;
            trendChartInstance.update();
        }
    }
    
    // استماع لتغيير الوضع المظلم
    if (window.MutationObserver) {
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === 'class') {
                    setTimeout(updateChartsTheme, 100);
                }
            });
        });
        observer.observe(document.body, { attributes: true });
    }
    
    // تحديث الألوان عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(updateChartsTheme, 200);
        loadFirstAnalysis();
    });
    
    // استدعاء loadFirstAnalysis عند تحديث البيانات
    window.addEventListener('refreshUserData', function() {
        loadFirstAnalysis();
    });
</script>

<style>

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }
    
    @media (max-width: 480px) {
        .stats-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
    }

        transition: all 0.3s ease;

    }

        max-height: 220px;

    }
    
    /* دعم الوضع المظلم للرسوم البيانية */
    body.dark .stats-grid .stat-card {
        background: linear-gradient(135deg, #1a202c, #2d3748);

    body.dark .stats-grid .stat-number {
        color: #9b59b6;

    body.dark .stats-grid .stat-label {

    /* نمط نقطة البداية */
    .stat-mini {
        background: #f0f4ff;

        font-size: 12px;
        color: #667eea;
    }
    
    body.dark .stat-mini {
        background: #1a202c;
        color: #9b59b6;
    }
</style>
